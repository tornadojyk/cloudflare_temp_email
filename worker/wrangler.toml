name = "cloudflare_temp_email"
main = "src/worker.ts"
compatibility_date = "2025-04-01"
compatibility_flags = [ "nodejs_compat" ]
keep_vars = true

# ==================== 【1. 路由配置 - 需修改】 ====================
# 将此处修改为你准备作为临时邮箱 API 的自定义二级域名
routes = [
  { pattern = "api.yz.cc.cd", custom_domain = true }
]

[vars]
DEFAULT_LANG = "zh"
TITLE = "免费临时邮箱" 
PREFIX = "tmp"

# ==================== 【2. 邮箱域名配置 - 需修改】 ====================
# 填入你接收邮件的域名（比如 mail.yourdomain.com 或 yourdomain.com）
# 注：如果你只有一个域名，两个方括号里填一样的即可
DEFAULT_DOMAINS = ["yz.cc.cd"] 
DOMAINS = ["yz.cc.cd"] 

# ==================== 【3. 密码与安全配置 - 需修改】 ====================
# 管理员后台登录密码（原版格式为数组，请在括号内填入你的强密码）
ADMIN_PASSWORDS = ["kevinjyk"]

# JWT 密钥，用于用户登录 Session 加密（请随意乱打一串长字母/数字组合）
JWT_SECRET = "security_session_secret_random_string_12345"

# ==================== 【4. 突破发信限制配置 - 已自动融合】 ====================
# 默认发信额度：直接改为 9999 突破限制
DEFAULT_SEND_BALANCE = 9999
# 免发信限制的管理员角色
NO_LIMIT_SEND_ROLE = "admin"

# 其他基础功能开关（已默认开启）
ENABLE_USER_CREATE_EMAIL = true
ENABLE_USER_DELETE_EMAIL = true
ENABLE_AUTO_REPLY = false
ENABLE_ADDRESS_PASSWORD = false

# ==================== 【5. 数据库配置 - 需修改】 ====================
[[d1_databases]]
binding = "DB"
database_name = "temp-email-db"
# 此处已填入你上一轮生成的 D1 数据库 ID
database_id = "533b1f40-6740-4825-bbbd-23f0e951d615"

# ==================== 【6. KV 缓存配置 - 需修改】 ====================
# 绑定你在第 2 步创建的 KV 命名空间
[[kv_namespaces]]
binding = "KV"
id = "408a1de59e4f41f7934a2d798c995b93"

# ==================== 【7. 发件配置 - 需修改】 ====================
# 注入你刚才在 Resend 申请的 API 发信密钥（注意：由于你的域名是 yz.cc.cd，变量名必须严格为以下拼写，点换成下划线）
RESEND_TOKEN = "re_fuGo1fKs_3TiB2uTcPysZBh2w3kP6UJNc"


# ==================== 以下为高级/可选配置（默认保持注释置灰即可） ====================
# 如果以后需要开启 AI 智能提取验证码，可以取消下方 [ai] 两行的注释
# [ai]
# binding = "AI"
